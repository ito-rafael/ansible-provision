- name: pre-run | create aurman group
  tags: pre-run,aurman,mitogen
  group:
    name: aurman
    state: present
    system: true

- name: pre-run | create aurman user
  tags: pre-run,aurman,mitogen
  user:
    name: aurman
    group: aurman
    groups: wheel
    createhome: yes
    state: present
    comment: "AUR manager"
    system: yes
    shell: /usr/bin/nologin

- name: pre-run | setup aurman sudoers file
  tags: pre-run,aurman,mitogen
  copy:
    dest: /etc/sudoers.d/aurman
    content: |
      aurman ALL=(ALL) NOPASSWD: /usr/bin/pacman
    owner: root
    group: root
    mode: '0440'
    validate: "/usr/bin/visudo -cf %s"
