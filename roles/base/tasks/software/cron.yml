- name: system | cron | disable sendmail
  tags: ansible,cron
  replace:
    path: /etc/fcron/fcron.conf
    regexp: '^(sendmail.*=.*/usr/bin/sendmail)$'
    replace: '#\g<1>'
  when: ansible_facts['distribution'] == "Archlinux"
  notify:
    - reload systemd services (system scope)
    - system | cron | restart cron systemd service

- name: system | cron | crontab symlink
  tags: ansible,cron
  file:
    src: /usr/bin/fcrontab
    path: /usr/bin/crontab
    state: link
  when: ansible_facts['distribution'] == "Archlinux"
