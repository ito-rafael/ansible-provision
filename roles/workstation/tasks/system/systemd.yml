- name: system | systemd | ensure systemd dirs exist
  tags: systemd
  file:
    path: /home/rafael/.config/{{ item }}
    state: directory
    owner: rafael
    group: rafael
    mode: 0700
  loop:
    - systemd
    - systemd/user
    - environment.d

- name: system | systemd | copy systemd environment.d env vars
  tags: systemd
  copy:
    remote_src: true
    src: /home/ansible/git/dotfiles/systemd/environment.d/env-vars.conf
    dest: /home/rafael/.config/environment.d/env-vars.conf
    owner: rafael
    group: rafael
    mode: 0600
