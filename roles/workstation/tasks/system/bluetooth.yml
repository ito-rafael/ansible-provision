- name: system | bluetooth | install BlueZ
  tags: system,bluetooth
  package:
    name:
      - bluez               # Bluetooth protocol stack
      - bluez-utils         # bluetoothctl utility

- name: system | bluetooth | install Blueman (GTK+ Bluetooth manager)
  tags: system,bluetooth
  package:
    name: blueman             # blueman GUI (Bluetooth manager)

- name: system | bluetooth | install Rofi integration (AUR)
  tags: system,bluetooth
  become_user: aurman
  kewlfft.aur.aur:
    name:
      - rofi-bluetooth-git
  when: ansible_facts['distribution'] == "Archlinux"

- name: system | bluetooth | check if btusb kernel module is loaded
  tags: system,bluetooth,kernel
  modprobe:
    name: btusb
    state: present
  register: btusb_mod

- name: system | kernel | load Bluetooth kernel module
  tags: system,bluetooth,kernel
  copy:
    src: files/kernel/bluetooth.conf
    dest: /etc/modules-load.d/bluetooth.conf
    owner: root
    group: root
    mode: 0644
  when: btusb_mod.changed

- name: system | bluetooth | start Bluetooth daemon
  tags: system,bluetooth
  systemd:
    name: bluetooth
    state: started
    enabled: yes
