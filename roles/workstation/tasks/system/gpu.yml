- name: system | GPU | install GPU-related packages
  tags: system,gpu
  package:
    name:
      - pciutils    # PCI utilities (provides lspci)
      - nvtop       # process monitoring for GPUs
      - mesa        # open-source OpenGL drivers
      - lib32-mesa  # open-source OpenGL drivers for 32-bit

- name: system | GPU NVIDIA | install Nouveau open source driver
  tags: system,gpu,gpu-nvidia
  become_user: aurman
  kewlfft.aur.aur:
    name:
      - nouveau-fw  # video & pgraph firmwares
  when:
    - nvidia_driver == "nouveau"
    - ansible_facts['distribution'] == "Archlinux"

- name: system | GPU | identify GPU manufacturer
  tags: system,gpu
  shell: lspci | grep -i 'vga'
  changed_when: false
  failed_when: false
  register: gpu_info

- name: include NVIDIA GPU tasks
  tags: system,gpu,nvidia
  import_tasks: gpu-nvidia.yml
  when: "'NVIDIA' in gpu_info.stdout"

- name: include AMD GPU tasks
  tags: system,gpu,amd
  import_tasks: gpu-amd.yml
  when: "'AMD' in gpu_info.stdout"

- name: include Intel GPU tasks
  tags: system,gpu,amd
  import_tasks: gpu-amd.yml
  when: "'Intel' in gpu_info.stdout"
