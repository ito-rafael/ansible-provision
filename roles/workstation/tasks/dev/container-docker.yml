- name: development | container-docker | Docker install engine
  tags: dev,container,docker
  package:
    name: docker

- name: development | container-docker | Docker start & enable daemon
  tags: dev,container,docker
  systemd:
    name: docker
    state: started
    enabled: yes

- name: development | container-docker | Docker install Compose
  tags: dev,container,docker
  package:
    name: docker-compose

- name: development | container-docker | Docker install Buildx
  tags: dev,container,docker
  package:
    name: docker-buildx

- name: development | container-docker | Docker add user to group
  tags: dev,container,docker,rafael,groups
  user:
    name: rafael
    append: yes
    groups: docker
