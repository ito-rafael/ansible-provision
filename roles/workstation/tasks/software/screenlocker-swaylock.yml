- name: software | screen locker | install swaylock
  tags: screen-locker,swaylock
  become_user: aurman
  kewlfft.aur.aur:
    name: swaylock-effects  # screen locker
  when: ansible_facts['distribution'] == "Archlinux"

- name: software | screen locker | ensure swaylock dir exist
  tags: screen-locker,swaylock
  file:
    path: /home/rafael/.config/swaylock
    state: directory
    owner: rafael
    group: rafael
    mode: 0700

- name: software | screen locker | copy swaylock dotfiles
  tags: screen-locker,swaylock
  copy:
    src: /home/ansible/git/dotfiles/swaylock/{{ item.filename }}
    dest: /home/rafael/.config/swaylock/{{ item.filename }}
    remote_src: true
    owner: rafael
    group: rafael
    mode: "{{ item.mode }}"
  with_items:
    - { filename: 'config',         mode: '0600' }
    - { filename: 'lock-screen.sh', mode: '0700' }
