- name: software | email | Thunderbird
  tags: email,thunderbird
  package:
    name: thunderbird

- name: software | email | ensure Thunderbird dir exists
  tags: email,thunderbird
  file:
    path: /home/rafael/.thunderbird/default
    state: directory
    owner: rafael
    group: rafael
    mode: 0700

- name: software | email | copy static Thunderbird dotfiles
  tags: email,thunderbird
  copy:
    remote_src: true
    src: /home/ansible/git/dotfiles/thunderbird/profiles.ini
    dest: /home/rafael/.thunderbird/profiles.ini
    owner: rafael
    group: rafael
    mode: 0600

- name: software | email | template Thunderbird user.js
  tags: email,thunderbird
  template:
    src: /home/ansible/git/dotfiles/thunderbird/user.js.j2
    dest: /home/rafael/.thunderbird/default/user.js
    owner: rafael
    group: rafael
    mode: 0600
  vars:
    email_personal_gmail:       "{{ lookup('pipe', 'sudo -u rafael pass show email/personal_gmail') | trim }}"
    email_academic_unicamp:     "{{ lookup('pipe', 'sudo -u rafael pass show email/academic_unicamp') | trim }}"
    email_personal_promotional: "{{ lookup('pipe', 'sudo -u rafael pass show email/personal_promotional') | trim }}"
    email_personal_outlook:     "{{ lookup('pipe', 'sudo -u rafael pass show email/personal_outlook') | trim }}"
  no_log: true
