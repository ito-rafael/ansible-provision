- name: software | semaphore | install Semaphore UI
  tags: semaphore-ui
  become_user: aurman
  kewlfft.aur.aur:
    name: semaphore-bin
  when: ansible_facts['distribution'] == "Archlinux"

- name: software | semaphore | ensure packages are installed
  tags: semaphore-ui
  package:
    name:
      - pass      # password manager
      - sqlite    # SQL database
      - opentofu  # infrastructure as code

- name: software | semaphore | ensure semaphore dirs exist
  tags: semaphore-ui
  file:
    path: /home/ansible/.config/{{ item }}
    state: directory
    owner: ansible
    group: ansible
    mode: 0700
  with_items:
    - semaphore
    - systemd/user

- name: software | semaphore | check if semaphore config already exists
  tags: semaphore-ui
  ansible.builtin.stat:
    path: /home/ansible/.config/semaphore/config.json
  register: semaphore_config_file

- name: software | semaphore | read existing config if it exists
  tags: semaphore-ui
  ansible.builtin.slurp:
    src: /home/ansible/.config/semaphore/config.json
  register: existing_config_slurp
  when: semaphore_config_file.stat.exists

- name: software | semaphore | generate secure keys and write config file
  tags: semaphore-ui
  copy:
    dest: /home/ansible/.config/semaphore/config.json
    owner: ansible
    group: ansible
    mode: 0600
    content: "{{ semaphore_config | to_nice_json(indent=2) }}\n"
  vars:
    # parse config.json if it exists, or create an empty dictionary {} if it doesn't exist.
    existing_config: "{{ (existing_config_slurp.content | b64decode | from_json) if semaphore_config_file.stat.exists else {} }}"
    # define the config file
    semaphore_config:
      dialect: "sqlite"
      sqlite:
        host: "/home/ansible/.config/semaphore/database.sqlite"
      tmp_path: "/home/ansible/tmp/semaphore"
      web_host: "http://localhost:3000"
      host: "127.0.0.1"
      port: "3000"
      # use the existing key if it exists, otherwise generate a new one.
      cookie_hash: "{{ existing_config.cookie_hash | default(lookup('pipe', 'openssl rand -base64 32')) }}"
      cookie_encryption: "{{ existing_config.cookie_encryption | default(lookup('pipe', 'openssl rand -base64 32')) }}"
      access_key_encryption: "{{ existing_config.access_key_encryption | default(lookup('pipe', 'openssl rand -base64 32')) }}"
      # configure Telegram bot
      telegram_alert: true
      telegram_chat: "{{ lookup('pipe', 'sudo -u rafael pass show telegram/chat_id') }}"
      telegram_token: "{{ lookup('pipe', 'sudo -u rafael pass show telegram/bot_token') }}"
  notify: software | semaphore | restart user systemd service

- name: software | semaphore | check if admin user exists in database
  tags: semaphore-ui
  become_user: ansible
  ansible.builtin.command: >
    sqlite3 /home/ansible/.config/semaphore/database.sqlite
    "SELECT COUNT(*) FROM user WHERE username = 'ansible';"
  register: semaphore_admin_check
  changed_when: false  # read-only query
  failed_when: false   # avoid errors if the table doesn't exist yet

- name: software | semaphore | create admin user
  tags: semaphore-ui
  become_user: ansible
  ansible.builtin.command: >
    /usr/bin/semaphore user add
    --admin
    --login ansible
    --name "{{ lookup('pipe', 'sudo -u rafael pass show semaphore/admin_name') | trim }}"
    --email "{{ lookup('pipe', 'sudo -u rafael pass show semaphore/admin_email') | trim }}"
    --password "{{ lookup('pipe', 'sudo -u rafael pass show semaphore/admin_password') | trim }}"
    --config /home/ansible/.config/semaphore/config.json
  # hide the output to prevent the password from being printed in the Ansible logs
  no_log: true
  # only run if the table was missing (rc != 0), or if the user count is exactly 0
  when: >
    semaphore_admin_check.rc != 0 or
    semaphore_admin_check.stdout | trim == "0"
  notify: software | semaphore | restart user systemd service

- name: software | semaphore | copy user systemd service
  tags: semaphore-ui
  copy:
    src: /home/ansible/git/dotfiles/semaphore/semaphore.service
    dest: /home/ansible/.config/systemd/user/semaphore.service
    remote_src: true
    owner: ansible
    group: ansible
    mode: 0600
  notify:
    - reload user systemd services (ansible)
    - software | semaphore | restart user systemd service

- name: software | semaphore | grant ansible user rights to ansible-provision test env
  tags: semaphore-ui
  ansible.posix.acl:
    path: "{{ item }}"
    entity: ansible
    etype: user
    permissions: x
    state: present
  loop:
    - /home/rafael
    - /home/rafael/git

- name: software | semaphore | grant ansible user rx permissions recursively to ansible-provision test env
  tags: semaphore-ui
  ansible.builtin.command: >
    setfacl -R -m u:ansible:rx /home/rafael/git/ansible-provision
  # suppress the "changed" status because checking ACL of many Git objects is computationally too expensive
  changed_when: false

- name: software | semaphore | check if OpenTofu token already exists in pass
  tags: semaphore-ui,opentofu
  ansible.builtin.stat:
    path: /home/rafael/.password-store/semaphore/opentofu_token.gpg
  register: opentofu_token_file

- name: software | semaphore | login to API to get session cookie
  tags: semaphore-ui,opentofu
  ansible.builtin.uri:
    url: "http://localhost:3000/api/auth/login"
    method: POST
    body_format: json
    body:
      auth: "ansible"
      password: "{{ lookup('pipe', 'sudo -u rafael pass show semaphore/admin_password') | trim }}"
    status_code: 204
  register: semaphore_login
  no_log: true
  when: not opentofu_token_file.stat.exists

- name: software | semaphore | generate permanent API token
  tags: semaphore-ui,opentofu
  ansible.builtin.uri:
    url: "http://localhost:3000/api/user/tokens"
    method: POST
    headers:
      Cookie: "{{ semaphore_login.set_cookie }}"
    status_code: [200, 201]
    return_content: true
  register: semaphore_token_response
  no_log: true
  when: not opentofu_token_file.stat.exists

- name: software | semaphore | save OpenTofu token using pass
  tags: semaphore-ui,opentofu
  become_user: rafael
  ansible.builtin.shell: |
    echo "{{ semaphore_token_response.json.id }}" | pass insert -e semaphore/opentofu_token
  args:
    chdir: /home/rafael
  no_log: true
  when: not opentofu_token_file.stat.exists

- name: software | semaphore | apply config with OpenTofu
  tags: semaphore-ui,tofu
  become_user: ansible
  community.general.terraform:
    project_path: "/home/ansible/git/dotfiles/opentofu"
    binary_path: "/usr/bin/tofu"
    state: present
    force_init: true
    variables:
      target_hostname: "{{ ansible_facts['hostname'] }}"
      vault_password_lbic: "{{ lookup('pipe', 'sudo -u rafael pass show semaphore/vault_password_lbic') | trim }}"
  environment:
    SEMAPHOREUI_API_BASE_URL: "http://localhost:3000/api"
    SEMAPHOREUI_API_TOKEN: "{{ lookup('pipe', 'sudo -u rafael pass show semaphore/opentofu_token') | trim }}"
  register: tofu_result

- name: software | semaphore | cleanup built-in auto-generated default resources
  tags: semaphore-ui,tofu
  become_user: ansible
  ansible.builtin.script:
    cmd: /home/ansible/git/dotfiles/semaphore/cleanup-builtin-vars.sh
  environment:
    SEMAPHOREUI_API_TOKEN: "{{ lookup('pipe', 'sudo -u rafael pass show semaphore/opentofu_token') | trim }}"
  changed_when: false
