- name: software | widget | install eww
  tags: widget
  become_user: aurman
  kewlfft.aur.aur:
    name: eww
  when: ansible_facts['distribution'] == "Archlinux"

- name: software | widget | ensure eww dirs exists
  tags: widget
  file:
    path: /home/rafael/.config/{{ item }}
    state: directory
    owner: rafael
    group: rafael
    mode: 0700
  loop:
    - eww
    - icon

- name: software | widget | copy eww dotfiles
  tags: widget
  copy:
    remote_src: true
    src: /home/ansible/git/dotfiles/eww/{{ item.name }}
    dest: /home/rafael/.config/{{ item.path }}
    owner: rafael
    group: rafael
    mode: "{{ item.mode }}"
  loop:
    - { name: 'eww.yuck', path: 'eww/eww.yuck',   mode: '0600' }
    - { name: 'eww.scss', path: 'eww/eww.scss',   mode: '0600' }
    - { name: 'osd.sh',   path: 'scripts/osd.sh', mode: '0700' }

- name: software | widget | copy eww icons
  tags: widget
  copy:
    remote_src: true
    src: /home/ansible/git/dotfiles/icon/{{ item.src }}
    dest: /home/rafael/.config/icon/{{ item.dest }}
    owner: rafael
    group: rafael
    mode: "{{ item.mode }}"
  loop:
    - { src: 'vol-mute.png',              dest: 'vol-mute.png',              mode: '0600' }
    - { src: 'vol-low.png',               dest: 'vol-low.png',               mode: '0600' }
    - { src: 'vol-med.png',               dest: 'vol-med.png',               mode: '0600' }
    - { src: 'vol-high.png',              dest: 'vol-high.png',              mode: '0600' }
    - { src: 'mic.svg',                   dest: 'mic.svg',                   mode: '0600' }
    - { src: 'mic-mute.svg',              dest: 'mic-mute.svg',              mode: '0600' }
    - { src: 'brightness.svg',            dest: 'brightness.svg',            mode: '0600' }
    - { src: 'kbd-backlit-off.svg',       dest: 'kbd-backlit-off.svg',       mode: '0600' }
    - { src: 'kbd-backlit-low.svg',       dest: 'kbd-backlit-low.svg',       mode: '0600' }
    - { src: 'kbd-backlit-high.svg',      dest: 'kbd-backlit-high.svg',      mode: '0600' }
    - { src: 'screen-color-temperature/', dest: 'screen-color-temperature/', mode: '0700' }
