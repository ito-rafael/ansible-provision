- name: software | screen locker | install hyprlock
  tags: screen-locker,hyprlock
  package:
    name: hyprlock

- name: software | screen locker | ensure hyprlock dir exist
  tags: screen-locker,hyprlock
  file:
    path: /home/rafael/.config/hypr
    state: directory
    owner: rafael
    group: rafael
    mode: 0700

- name: software | screen locker | copy hyprlock dotfiles
  tags: screen-locker,hyprlock
  copy:
    src: /home/ansible/git/dotfiles/hypr/lock-screen.sh
    dest: /home/rafael/.config/hypr/lock-screen.sh
    remote_src: true
    owner: rafael
    group: rafael
    mode: 0700
