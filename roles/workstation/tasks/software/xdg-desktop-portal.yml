- name: software | xdg-desktop-portal | copy XDG MIME dotfile
  tags: wayland,portals
  copy:
    remote_src: true
    src: /home/ansible/git/dotfiles/xdg-desktop-portal/mimeapps.list
    dest: /home/rafael/.config/mimeapps.list
    owner: rafael
    group: rafael
    mode: 0600
