- name: software | browser Zen | set variables
  tags: browser,zen
  ansible.builtin.set_fact:
    zen_distrib_path: "/opt/zen-browser-bin/distribution"
    zen_dotfiles_dir: "/home/ansible/git/dotfiles/zen"

- name: software | browser Zen | install Zen Browser
  tags: browser,zen
  become_user: aurman
  kewlfft.aur.aur:
    name: zen-browser-bin
  when: ansible_facts['distribution'] == "Archlinux"

- name: software | browser Zen | install add-ons & apply policy
  tags: browser,zen
  copy:
    src: "{{ zen_dotfiles_dir }}/policies.json"
    dest: "{{ zen_distrib_path }}/policies.json"
    remote_src: true
    owner: root
    group: root
    mode: 0644

- name: software | browser Zen | copy launcher for Tab Session Manager
  tags: browser,zen
  copy:
    src: "{{ zen_dotfiles_dir }}/{{ item.src }}"
    dest: "/home/rafael/.local/{{ item.dest }}"
    remote_src: true
    owner: root
    group: root
    mode: "{{ item.mode }}"
  loop:
    - { src: 'zen-tsm.desktop',             dest: 'share/applications/zen-tsm.desktop', mode: '0644' }
    - { src: 'scripts/zen-tsm-launcher.py', dest: 'bin/zen-tsm-launcher.py',            mode: '0700' }

#----------------------------------
# read-only block
#----------------------------------

- name: software | browser Zen | check if profiles.ini exists
  tags: browser,zen
  become_user: rafael
  ansible.builtin.stat:
    path: "/home/rafael/.config/zen/profiles.ini"
  register: zen_profile

- name: software | browser Zen | check if Zen is running
  tags: browser,zen
  ansible.builtin.command: set -o pipefail && pgrep -a -i "zen-bin"
  failed_when: false
  changed_when: false
  register: zen_running

#----------------------------------
# gatekeeper: abort if needed
#----------------------------------

- name: software | browser Zen | abort if Zen is currently open
  tags: browser,zen
  ansible.builtin.fail:
    msg: >
      [ABORTED] Zen Browser is currently running and an initial burn-in is pending!
      Please close the browser manually and re-run the playbook to apply the changes safely.
  when:
    - zen_running.rc == 0
    - not zen_profile.stat.exists

#----------------------------------
# write block (burn-in & scripts)
#----------------------------------

- name: software | browser Zen | initial profile generation and add-on installation
  tags: browser,zen
  block:
    - name: software | browser Zen | run Xvfb to generate profile and force add-on downloads
      become_user: rafael
      ansible.builtin.shell: |
        # launch a full GUI session invisibly in a virtual buffer, targeting a real website
        xvfb-run -a zen-browser https://example.com > /dev/null 2>&1 &
        # give Zen 30 seconds to fully boot, parse policies, and download the .xpi files
        sleep 30
        # gracefully ask the core browser engine to shut down
        killall -15 zen-bin || true
        # give Zen internal engine 5 seconds to flush all preferences to disk
        sleep 5

    - name: software | browser Zen | wait for OS to release profile file locks
      become_user: rafael
      ansible.builtin.pause:
        seconds: 3
  when:
    - not zen_profile.stat.exists

- name: software | browser Brave | run Python scripts to configure preferences & extensions
  tags: browser,zen
  become_user: rafael
  ansible.builtin.command: "python3 {{ zen_dotfiles_dir }}/scripts/{{ item }}"
  loop:
    - surfingkeys_advanced_mode.py
    - surfingkeys_load_settings.py
    - tab-session-manager_keybindings.py
    - tab-session-manager_theme_dark.py
    - video-speed-controller_keybindings.py
    - zoom.py
  register: python_execution
  changed_when: "'Success' in python_execution.stdout"
