- name: software | browser | install Brave
  tags: browser,brave
  become_user: aurman
  kewlfft.aur.aur:
    name:
      #- brave-bin
      #- brave-beta-bin
      - brave-origin-beta-bin
  when: ansible_facts['distribution'] == "Archlinux"

- name: software | browser | copy Brave dotfiles
  tags: browser,brave
  copy:
    src: /home/ansible/git/dotfiles/brave/config/brave-flags.conf
    dest: /home/rafael/.config/brave-flags.conf
    remote_src: true
    owner: rafael
    group: rafael
    mode: 0600

- name: software | browser | fix brave-beta shell script
  tags: browser,brave
  become: yes
  ansible.builtin.replace:
    path: /usr/bin/brave-beta
    regexp: '"\$USER_FLAGS"'
    replace: '$USER_FLAGS'

- name: software | browser | ensure Brave extensions dir exist
  tags: browser,brave
  file:
    path: /etc/brave/policies/managed
    state: directory
    owner: root
    group: root
    mode: 0755

- name: software | browser | copy Brave dotfiles
  tags: browser,brave
  copy:
    src: /home/ansible/git/dotfiles/brave/{{ item }}
    dest: /etc/brave/policies/managed/{{ item }}
    remote_src: true
    owner: root
    group: root
    mode: 0644
  loop:
    - extension_install_policy.json  # install extensions
    - dev_mode.json                  # ensure developer mode is available

- name: software | browser | disable Brave hardware acceleration on ancient GPUs
  tags: browser,brave
  copy:
    src: /home/ansible/git/dotfiles/brave/hardware_acceleration.json
    dest: /etc/brave/policies/managed/hardware_acceleration.json
    remote_src: true
    owner: root
    group: root
    mode: 0644
  when: nvidia_driver == "nouveau"

- name: software | browser | ensure .desktop files dir exists
  tags: browser,brave
  file:
    path: /home/rafael/.local/share/applications
    state: directory
    owner: rafael
    group: rafael
    mode: 0755

- name: software | browser | copy brave-browser desktop file
  tags: browser,brave
  copy:
    src: /home/ansible/git/dotfiles/brave/brave-browser.desktop
    dest: /home/rafael/.local/share/applications/brave-browser.desktop
    remote_src: true
    owner: rafael
    group: rafael
    mode: 0600

- name: software | browser | check if Brave Preferences file exists
  tags: browser,brave
  ansible.builtin.stat:
    path: "{{ brave_prefs_path }}"
  register: brave_prefs

- name: software | browser | get current Brave theme setting
  tags: browser,brave
  ansible.builtin.command: "jq -r '.browser.theme.color_scheme2 // empty' {{ brave_prefs_path }}"
  register: brave_theme_check
  changed_when: false
  when: brave_prefs.stat.exists

- name: software | browser | set Brave theme to dark mode
  tags: browser,brave
  ansible.builtin.shell: |
    killall -q brave || true
    jq '.browser.theme.color_scheme2 = 2' "{{ brave_prefs_path }}" > "{{ brave_prefs_path }}.tmp"
    mv "{{ brave_prefs_path }}.tmp" "{{ brave_prefs_path }}"
  when:
    - brave_prefs.stat.exists
    - brave_theme_check.stdout | default('') != "2"
