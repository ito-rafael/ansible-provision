- name: software | browser | install Brave
  tags: browser,brave
  become_user: aurman
  kewlfft.aur.aur:
    name:
      - brave-bin
      - brave-beta-bin

- name: software | browser | copy Brave dotfiles
  tags: browser,brave
  copy:
    src: /home/ansible/git/dotfiles/brave/{{ item.src }}
    dest: /home/rafael/.config/{{ item.dest }}
    remote_src: true
    owner: rafael
    group: rafael
    mode: 0600
  with_items:
    - { src: 'brave-flags.conf', dest: 'brave-flags.conf' }

- name: software | browser | copy Brave Beta dotfiles
  tags: browser,brave
  copy:
    src: /home/ansible/git/dotfiles/brave-beta/{{ item.src }}
    dest: /home/rafael/.config/{{ item.dest }}
    remote_src: true
    owner: rafael
    group: rafael
    mode: 0600
  with_items:
    - { src: 'brave-beta-flags.conf', dest: 'brave-beta-flags.conf' }

- name: software | browser | fix brave-beta shell script
  tags: browser,brave
  become: yes
  ansible.builtin.replace:
    path: /usr/bin/brave-beta
    regexp: '"\$USER_FLAGS"'
    replace: '$USER_FLAGS'

- name: software | browser | ensure Brave dir exist
  tags: browser,brave
  file:
    path: /etc/brave/policies/managed
    state: directory
    owner: root
    group: root
    mode: 0755

- name: software | browser | ensure Brave extensions dir exist
  tags: browser,brave
  #become: yes
  file:
    path: /etc/brave/policies/managed
    state: directory
    owner: root
    group: root
    mode: 0755

- name: software | browser | copy Brave extensions dotfile
  tags: browser,brave
  copy:
    src: /home/ansible/git/dotfiles/brave/extension_install_policy.json
    dest: /etc/brave/policies/managed/extension_install_policy.json
    remote_src: true
    owner: root
    group: root
    mode: 0644

- name: software | browser | ensure .desktop files dir exists
  tags: browser,brave
  file:
    path: /home/rafael/.local/share/applications
    state: directory
    owner: rafael
    group: rafael
    mode: 0755

- name: software | browser | copy brave-browser desktop file
  tags: browser,brave
  copy:
    src: /home/ansible/git/dotfiles/brave/brave-browser.desktop
    dest: /home/rafael/.local/share/applications/brave-browser.desktop
    remote_src: true
    owner: rafael
    group: rafael
    mode: 0600
