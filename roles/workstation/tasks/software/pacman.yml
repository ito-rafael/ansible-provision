- name: software | package-manager | pacman-contrib install
  tags: pacman
  package:
    name: pacman-contrib

- name: software | package-manager | force pacman-key refresh keys
  tags: pacman,pacman-key
  pacman:
    name: archlinux-keyring
    force: yes

- name: software | package-manager | enable colors
  tags: pacman
  replace:
    path: /etc/pacman.conf
    regexp: '^#\s*Color'
    replace: 'Color'

- name: software | package-manager | enable parallel downloads
  tags: pacman
  replace:
    path: /etc/pacman.conf
    regexp: '^.*(ParallelDownloads).*$'
    replace: '\g<1> = 5'

- name: software | package-manager | enable ILoveCandy
  tags: pacman
  lineinfile:
    path: /etc/pacman.conf
    regexp: '^ILoveCandy'
    insertafter: '^#?\s*ParallelDownloads\s*=\s*\d+'
    line: 'ILoveCandy'

- name: software | package-manager | enable multilib repository
  tags: pacman
  replace:
    path: /etc/pacman.conf
    regexp: '^#(\[multilib\]$\n)^#(Include.*)$'
    replace: '\g<1>\g<2>'
  register: multilib_enabled

- name: software | package-manager | update cache after enabling multilib
  tags: pacman
  pacman:
    update_cache: true
  when: multilib_enabled.changed

- name: software | package-manager | ensure pacman hooks dir exists
  tags: pacman
  file:
    path: /etc/pacman.d/hooks
    state: directory
    owner: root
    group: root
    mode: 0700

- name: software | package-manager | copy pacman hooks
  tags: pacman
  copy:
    remote_src: true
    src: /home/ansible/git/dotfiles/pacman/{{ item }}
    dest: /etc/pacman.d/hooks/{{ item }}
    owner: root
    group: root
    mode: 0600
  with_items:
    - 00-prevent-interruption-pre.hook
    - 99-prevent-interruption-post.hook

- name: software | package-manager | install rebuild-detector
  tags: pacman,rebuild-detector
  package:
    name: rebuild-detector

- name: software | package-manager | install reflector
  tags: pacman,reflector
  package:
    name:
      - rsync       # prerequisite for reflector
      - reflector   # update /etc/pacman.d/mirrorlist sorting the mirrors by speed

- name: software | package-manager | install additional packages
  tags: pacman
  become_user: aurman
  kewlfft.aur.aur:
    name:
      - downgrade  # downgrade packages in Arch Linux
  when: ansible_facts['distribution'] == "Archlinux"

- name: software | package-manager | install informant news reader
  tags: pacman
  become_user: aurman
  kewlfft.aur.aur:
    name:
      - informant  # Arch Linux News reader and pacman hook
  when: ansible_facts['distribution'] == "Archlinux"
  register: informant_install

- name: software | package-manager | read Arch Linux news after informant installation
  tags: pacman,rafael,groups
  command: informant read --all
  when: informant_install.changed

- name: software | package-manager | add user to informant group
  tags: pacman,rafael,groups
  user:
    name: rafael
    append: yes
    groups: informant
