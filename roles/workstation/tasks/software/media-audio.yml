- name: software | media | install GStreamer codecs
  tags: media,audio
  package:
    name:
      - gst-plugins-good
      - gst-plugins-bad
      - gst-plugins-ugly
      - gst-libav
      - gst-plugin-pipewire
      - gst-plugin-va

