- name: software | media | install GStreamer codecs
  tags: media,audio
  package:
    name:
      - gst-plugins-good
      - gst-plugins-bad
      - gst-plugins-ugly
      - gst-libav
      - gst-plugin-pipewire

- name: software | media | install GStreamer codecs (hw video decoding)
  tags: media,audio
  package:
    name: gst-plugin-va
  when: nvidia_driver != "nouveau"

