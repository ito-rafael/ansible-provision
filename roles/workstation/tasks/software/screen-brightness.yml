- name: software | brightness | install DDC/CI tool & brightnessctl
  tags: software,brightness
  package:
    name:
      - brightnessctl  # screen brightness
      - ddcutil        # external monitor control
      - linux-headers  # DKMS dependency

- name: software | brightness | kernel driver for DDC/CI monitors
  tags: software,brightness
  become_user: aurman
  kewlfft.aur.aur:
    name:
      - ddcci-driver-linux-dkms-git
  when: ansible_facts['distribution'] == "Archlinux"

- name: software | brightness | copy the udev rules for external monitors
  tags: software,brightness
  copy:
    remote_src: true
    src: /home/ansible/git/dotfiles/udev/rules.d/99-ddcci.rules
    dest: /etc/udev/rules.d/99-ddcci.rules
    owner: root
    group: root
    mode: '0644'
  notify: update udev rules on the fly

- name: software | brightness | setup DDC/CI for NVIDIA proprietary drivers
  tags: software,brightness
  copy:
    content: "options nvidia NVreg_RegistryDwords=RMUseSwI2c=0x01;RMI2cSpeed=100\n"
    dest: /etc/modprobe.d/nvidia-i2c.conf
    owner: root
    group: root
    mode: '0644'

- name: software | brightness | set kernel modules to load on boot
  tags: software,brightness
  copy:
    content: "{{ item.driver }}\n"
    dest: "/etc/modules-load.d/{{ item.filename }}"
    owner: root
    group: root
    mode: '0644'
  loop:
    - { driver: 'i2c-dev',               filename: 'i2c-dev.conf' }
    - { driver: 'ddcci\nddcci_backlight', filename: 'ddcci.conf' }

- name: software | brightness | load kernel modules immediately
  tags: software,brightness
  community.general.modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - i2c-dev
    - ddcci
    - ddcci_backlight

- name: software | brightness | add user to i2c group
  tags: software,brightness,groups
  user:
    name: rafael
    append: yes
    groups: i2c
