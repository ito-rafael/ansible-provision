---
- hosts: "all:!lab"
  connection: local
  become: true
  strategy: linear
  tasks:
    - import_tasks: tasks/bootstrap-mitogen.yml

- hosts: "all:!lab"
  connection: local
  become: true
  pre_tasks:
    - import_tasks: tasks/update-cache.yml
  roles:
    - base

- hosts: workstation:laptop
  connection: local
  become: true
  roles:
    - role: workstation

- hosts: server
  connection: local
  become: true
  roles:
    - role: server

- hosts: lab
  connection: ssh
  become: true
  roles:
    - role: lab
...
