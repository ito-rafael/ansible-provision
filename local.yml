---
- hosts: "all:!lab"
  connection: local
  become: true
  strategy: linear
  tasks:
    - name: bootstrap | setup aurman environment [Arch Linux]
      import_tasks: tasks/setup-aurman.yml
      when: ansible_facts['distribution'] == "Archlinux"

    - name: bootstrap | install mitogen plugin
      import_tasks: tasks/bootstrap-mitogen.yml

- hosts: "all:!lab"
  connection: local
  become: true
  pre_tasks:
    - import_tasks: tasks/update-cache.yml
    - import_tasks: tasks/sync-git-repos.yml
  roles:
    - base

- hosts: workstation:laptop
  connection: local
  become: true
  roles:
    - role: workstation

- hosts: server
  connection: local
  become: true
  roles:
    - role: server

- hosts: lab
  connection: ssh
  become: true
  roles:
    - role: lab
...
